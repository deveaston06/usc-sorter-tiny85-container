[env:attiny85_via_ArduinoISP]
platform = atmelavr
board = attiny85
framework = arduino
upload_protocol = custom
upload_port = /dev/ttyUSB0
upload_speed = 19200
upload_flags =
    -C
    ${platformio.packages_dir}/tool-avrdude/avrdude.conf
    -p
    attiny85
    -P
    /dev/ttyUSB0
    -b
    19200
    -c
    stk500v1
upload_command = avrdude $UPLOAD_FLAGS -U flash:w:$SOURCE:i

